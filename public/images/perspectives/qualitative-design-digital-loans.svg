<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgQD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgQD)"/>
  <!-- Research/interview pattern - speech bubbles -->
  <g opacity="0.25">
    <!-- Person 1 circle -->
    <circle cx="300" cy="300" r="40" fill="none" stroke="#a0785a" stroke-width="2"/>
    <circle cx="300" cy="275" r="14" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <path d="M278,305 Q278,325 300,325 Q322,325 322,305" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <!-- Speech bubble from person 1 -->
    <rect x="370" y="240" width="200" height="80" rx="12" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <polygon points="370,280 355,290 370,300" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <!-- Text lines in bubble -->
    <rect x="390" y="262" width="120" height="3" rx="1.5" fill="#c8c8cb"/>
    <rect x="390" y="276" width="90" height="3" rx="1.5" fill="#c8c8cb"/>
    <rect x="390" y="290" width="140" height="3" rx="1.5" fill="#c8c8cb"/>
  </g>
  <g opacity="0.25">
    <!-- Person 2 circle -->
    <circle cx="900" cy="450" r="40" fill="none" stroke="#a0785a" stroke-width="2"/>
    <circle cx="900" cy="425" r="14" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <path d="M878,455 Q878,475 900,475 Q922,475 922,455" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <!-- Speech bubble from person 2 -->
    <rect x="630" y="400" width="230" height="80" rx="12" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <polygon points="860,440 875,445 860,450" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <!-- Text lines -->
    <rect x="650" y="422" width="140" height="3" rx="1.5" fill="#c8c8cb"/>
    <rect x="650" y="436" width="100" height="3" rx="1.5" fill="#c8c8cb"/>
    <rect x="650" y="450" width="160" height="3" rx="1.5" fill="#c8c8cb"/>
  </g>
  <!-- Clipboard/research document -->
  <g transform="translate(550, 200)" opacity="0.18">
    <rect x="0" y="0" width="180" height="240" rx="6" fill="none" stroke="#a0a0a5" stroke-width="1.5"/>
    <rect x="50" y="-12" width="80" height="24" rx="4" fill="#e0e0e2" stroke="#a0a0a5" stroke-width="1"/>
    <!-- Checklist lines -->
    <rect x="20" y="30" width="10" height="10" rx="2" fill="none" stroke="#c4a080" stroke-width="1"/>
    <rect x="40" y="33" width="100" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="55" width="10" height="10" rx="2" fill="none" stroke="#c4a080" stroke-width="1"/>
    <rect x="40" y="58" width="80" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="80" width="10" height="10" rx="2" fill="none" stroke="#c4a080" stroke-width="1"/>
    <rect x="40" y="83" width="110" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="105" width="10" height="10" rx="2" fill="none" stroke="#c4a080" stroke-width="1"/>
    <rect x="40" y="108" width="70" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="130" width="10" height="10" rx="2" fill="none" stroke="#c4a080" stroke-width="1"/>
    <rect x="40" y="133" width="95" height="2" rx="1" fill="#c8c8cb"/>
    <!-- Separator -->
    <line x1="20" y1="160" x2="160" y2="160" stroke="#e0e0e2" stroke-width="1"/>
    <!-- Notes area -->
    <rect x="20" y="175" width="140" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="190" width="120" height="2" rx="1" fill="#c8c8cb"/>
    <rect x="20" y="205" width="100" height="2" rx="1" fill="#c8c8cb"/>
  </g>
  <!-- Connecting dotted lines suggesting interview flow -->
  <line x1="340" y1="300" x2="550" y2="300" stroke="#e0e0e2" stroke-width="1" stroke-dasharray="6 4" stroke-opacity="0.3"/>
  <line x1="730" y1="420" x2="860" y2="440" stroke="#e0e0e2" stroke-width="1" stroke-dasharray="6 4" stroke-opacity="0.3"/>
  <!-- Insight markers -->
  <circle cx="200" cy="550" r="25" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="400" cy="580" r="30" fill="none" stroke="#c8c8cb" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="600" cy="560" r="22" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="800" cy="590" r="28" fill="none" stroke="#c8c8cb" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="1000" cy="570" r="20" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Ambient -->
  <circle cx="150" cy="180" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1050" cy="200" r="4" fill="#a0a0a5" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">QUALITATIVE DESIGN DIGITAL LOANS</text>
</svg>