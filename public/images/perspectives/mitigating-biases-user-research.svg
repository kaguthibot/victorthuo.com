<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgMB" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgMB)"/>
  <!-- Balance/Scale -->
  <!-- Center post -->
  <line x1="600" y1="220" x2="600" y2="500" stroke="#a0785a" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="600" cy="220" r="8" fill="none" stroke="#a0785a" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Base -->
  <rect x="540" y="500" width="120" height="8" rx="4" fill="#c8c8cb" opacity="0.2"/>
  <polygon points="560,500 640,500 620,520 580,520" fill="#c8c8cb" opacity="0.12"/>
  <!-- Beam - slightly tilted to show imbalance/bias -->
  <line x1="300" y1="240" x2="900" y2="210" stroke="#a0785a" stroke-width="2.5" stroke-opacity="0.3"/>
  <!-- Left pan -->
  <line x1="300" y1="240" x2="260" y2="340" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="300" y1="240" x2="340" y2="340" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <path d="M230,340 Q300,380 370,340" fill="none" stroke="#c4a080" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="230" y1="340" x2="260" y2="340" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="340" y1="340" x2="370" y2="340" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Items on left pan (heavier - biases) -->
  <circle cx="280" cy="320" r="12" fill="#c4a080" opacity="0.12"/>
  <circle cx="310" cy="315" r="10" fill="#c4a080" opacity="0.1"/>
  <circle cx="295" cy="300" r="8" fill="#c4a080" opacity="0.08"/>
  <!-- Right pan -->
  <line x1="900" y1="210" x2="860" y2="310" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="900" y1="210" x2="940" y2="310" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <path d="M830,310 Q900,350 970,310" fill="none" stroke="#c4a080" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="830" y1="310" x2="860" y2="310" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="940" y1="310" x2="970" y2="310" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Items on right pan (lighter - research) -->
  <circle cx="900" cy="290" r="8" fill="#c8c8cb" opacity="0.12"/>
  <!-- Research lens overlays -->
  <g opacity="0.15">
    <!-- Lens 1 -->
    <circle cx="250" cy="500" r="50" fill="none" stroke="#a0a0a5" stroke-width="1.5"/>
    <circle cx="250" cy="500" r="35" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="285" y1="535" x2="320" y2="570" stroke="#a0a0a5" stroke-width="2" stroke-linecap="round"/>
    <!-- Lens 2 -->
    <circle cx="950" cy="480" r="45" fill="none" stroke="#a0a0a5" stroke-width="1.5"/>
    <circle cx="950" cy="480" r="30" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="982" y1="510" x2="1012" y2="540" stroke="#a0a0a5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Bias indicators - dashed circles scattered -->
  <circle cx="180" cy="250" r="20" fill="none" stroke="#c4a080" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.15"/>
  <circle cx="450" cy="450" r="25" fill="none" stroke="#c8c8cb" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.12"/>
  <circle cx="750" cy="430" r="22" fill="none" stroke="#c4a080" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.15"/>
  <circle cx="1050" cy="280" r="18" fill="none" stroke="#c8c8cb" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.12"/>
  <!-- Cross-hatch pattern suggesting objectivity framework -->
  <g opacity="0.05">
    <line x1="450" y1="550" x2="750" y2="550" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="450" y1="580" x2="750" y2="580" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="450" y1="610" x2="750" y2="610" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="500" y1="530" x2="500" y2="630" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="550" y1="530" x2="550" y2="630" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="600" y1="530" x2="600" y2="630" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="650" y1="530" x2="650" y2="630" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="700" y1="530" x2="700" y2="630" stroke="#a0a0a5" stroke-width="1"/>
  </g>
  <!-- Ambient -->
  <circle cx="120" cy="150" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1080" cy="170" r="4" fill="#a0a0a5" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">MITIGATING BIASES IN USER RESEARCH</text>
</svg>