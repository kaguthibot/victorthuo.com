<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgLG" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </radialGradient>
    <linearGradient id="glass1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c4a080" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e0e0e2" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="glass2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c4a080" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e0e0e2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glass3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4a080" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bgLG)"/>
  <!-- Translucent layered shapes - liquid glass effect -->
  <!-- Layer 1 - large back shape -->
  <rect x="250" y="150" width="500" height="350" rx="40" fill="url(#glass1)" stroke="#c8c8cb" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Layer 2 - offset middle -->
  <rect x="400" y="220" width="480" height="330" rx="35" fill="url(#glass2)" stroke="#c8c8cb" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Layer 3 - front overlap -->
  <rect x="320" y="300" width="420" height="280" rx="30" fill="url(#glass3)" stroke="#c4a080" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Floating glass circles -->
  <circle cx="800" cy="200" r="80" fill="url(#glass1)" stroke="#c8c8cb" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="850" cy="260" r="60" fill="url(#glass2)" stroke="#c4a080" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Small glass pills -->
  <rect x="150" y="400" width="120" height="50" rx="25" fill="url(#glass3)" stroke="#c8c8cb" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="900" y="450" width="150" height="50" rx="25" fill="url(#glass1)" stroke="#c8c8cb" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Light refraction lines -->
  <line x1="300" y1="200" x2="700" y2="180" stroke="#fafafa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="450" y1="260" x2="820" y2="240" stroke="#fafafa" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="350" y1="340" x2="700" y2="330" stroke="#fafafa" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Subtle depth shadows -->
  <ellipse cx="500" cy="620" rx="200" ry="15" fill="#c8c8cb" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="650" cy="640" rx="180" ry="12" fill="#c8c8cb" opacity="0.06" filter="url(#blur1)"/>
  <!-- Ambient particles -->
  <circle cx="200" cy="180" r="3" fill="#c4a080" opacity="0.15"/>
  <circle cx="1000" cy="350" r="4" fill="#a0a0a5" opacity="0.12"/>
  <circle cx="600" cy="650" r="3" fill="#c4a080" opacity="0.15"/>
  <circle cx="950" cy="600" r="2" fill="#a0a0a5" opacity="0.18"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">APPLE LIQUID GLASS</text>
</svg>