<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgRS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgRS)"/>
  <!-- Storefront building outline -->
  <g opacity="0.3">
    <!-- Main building -->
    <rect x="300" y="200" width="600" height="400" fill="none" stroke="#a0785a" stroke-width="2"/>
    <!-- Roof -->
    <line x1="280" y1="200" x2="920" y2="200" stroke="#a0785a" stroke-width="2.5"/>
    <line x1="280" y1="195" x2="920" y2="195" stroke="#c4a080" stroke-width="1"/>
    <!-- Door -->
    <rect x="520" y="400" width="160" height="200" rx="4" fill="none" stroke="#a0785a" stroke-width="2"/>
    <circle cx="660" cy="510" r="5" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <!-- Windows -->
    <rect x="340" y="260" width="140" height="100" rx="3" fill="none" stroke="#c8c8cb" stroke-width="1.5"/>
    <line x1="410" y1="260" x2="410" y2="360" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="340" y1="310" x2="480" y2="310" stroke="#c8c8cb" stroke-width="1"/>
    <rect x="720" y="260" width="140" height="100" rx="3" fill="none" stroke="#c8c8cb" stroke-width="1.5"/>
    <line x1="790" y1="260" x2="790" y2="360" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="720" y1="310" x2="860" y2="310" stroke="#c8c8cb" stroke-width="1"/>
    <!-- Awning -->
    <path d="M300,200 L300,230 Q375,250 450,230 Q525,210 600,230 Q675,250 750,230 Q825,210 900,230 L900,200" fill="none" stroke="#c4a080" stroke-width="1.5"/>
  </g>
  <!-- Shelving lines inside (visible through windows) -->
  <g opacity="0.12">
    <line x1="350" y1="420" x2="480" y2="420" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="350" y1="450" x2="480" y2="450" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="350" y1="480" x2="480" y2="480" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="720" y1="420" x2="860" y2="420" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="720" y1="450" x2="860" y2="450" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="720" y1="480" x2="860" y2="480" stroke="#a0a0a5" stroke-width="1"/>
  </g>
  <!-- Ground line -->
  <line x1="100" y1="600" x2="1100" y2="600" stroke="#c8c8cb" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Surrounding context: simple building outlines -->
  <g opacity="0.12">
    <rect x="100" y="250" width="160" height="350" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <rect x="120" y="300" width="50" height="40" fill="none" stroke="#c8c8cb" stroke-width="0.8"/>
    <rect x="190" y="300" width="50" height="40" fill="none" stroke="#c8c8cb" stroke-width="0.8"/>
    <rect x="940" y="230" width="160" height="370" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <rect x="960" y="280" width="50" height="40" fill="none" stroke="#c8c8cb" stroke-width="0.8"/>
    <rect x="1030" y="280" width="50" height="40" fill="none" stroke="#c8c8cb" stroke-width="0.8"/>
  </g>
  <!-- Abstract signage -->
  <rect x="420" y="160" width="360" height="30" rx="3" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="480" y="170" width="240" height="3" rx="1.5" fill="#c4a080" opacity="0.15"/>
  <!-- Scattered elements -->
  <circle cx="200" cy="150" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1000" cy="150" r="4" fill="#a0a0a5" opacity="0.15"/>
  <circle cx="150" cy="650" r="3" fill="#a0a0a5" opacity="0.2"/>
  <circle cx="1050" cy="660" r="3" fill="#c4a080" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">RETAIL SHOP KENYA</text>
</svg>