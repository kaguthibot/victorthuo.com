<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgSF" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </radialGradient>
    <linearGradient id="moneyFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4a080" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a0785a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4a080" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgSF)"/>
  <!-- Mobile phone outline -->
  <g transform="translate(480, 140)" opacity="0.35">
    <rect x="0" y="0" width="240" height="460" rx="24" fill="none" stroke="#a0785a" stroke-width="2.5"/>
    <rect x="10" y="50" width="220" height="350" rx="4" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <!-- Top notch -->
    <rect x="80" y="15" width="80" height="6" rx="3" fill="#c8c8cb" opacity="0.4"/>
    <!-- Bottom button area -->
    <rect x="90" y="420" width="60" height="6" rx="3" fill="#c8c8cb" opacity="0.3"/>
    <!-- Screen content - financial data -->
    <rect x="30" y="75" width="100" height="3" rx="1.5" fill="#a0785a" opacity="0.3"/>
    <rect x="30" y="95" width="60" height="2" rx="1" fill="#c8c8cb" opacity="0.4"/>
    <!-- Balance display -->
    <rect x="30" y="125" width="180" height="60" rx="8" fill="#c4a080" opacity="0.08"/>
    <rect x="45" y="140" width="40" height="3" rx="1.5" fill="#c8c8cb" opacity="0.3"/>
    <rect x="45" y="155" width="80" height="4" rx="2" fill="#a0785a" opacity="0.25"/>
    <!-- Transaction lines -->
    <rect x="30" y="210" width="180" height="25" rx="4" fill="none" stroke="#e0e0e2" stroke-width="0.8"/>
    <rect x="30" y="245" width="180" height="25" rx="4" fill="none" stroke="#e0e0e2" stroke-width="0.8"/>
    <rect x="30" y="280" width="180" height="25" rx="4" fill="none" stroke="#e0e0e2" stroke-width="0.8"/>
    <rect x="30" y="315" width="180" height="25" rx="4" fill="none" stroke="#e0e0e2" stroke-width="0.8"/>
    <rect x="30" y="350" width="180" height="25" rx="4" fill="none" stroke="#e0e0e2" stroke-width="0.8"/>
  </g>
  <!-- Money flow arrows - left side -->
  <g opacity="0.2">
    <!-- Flow lines coming in from left -->
    <path d="M100,300 Q250,280 460,320" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <path d="M80,380 Q250,370 460,370" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <path d="M120,460 Q280,440 460,420" fill="none" stroke="#c4a080" stroke-width="1.5"/>
    <!-- Arrow tips -->
    <polygon points="460,320 448,314 450,326" fill="#c4a080"/>
    <polygon points="460,370 448,364 450,376" fill="#c4a080"/>
    <polygon points="460,420 448,414 450,426" fill="#c4a080"/>
  </g>
  <!-- Money flow arrows - right side -->
  <g opacity="0.2">
    <path d="M740,320 Q900,280 1100,300" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <path d="M740,370 Q900,370 1120,380" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <path d="M740,420 Q900,440 1080,460" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <polygon points="1100,300 1088,294 1090,306" fill="#a0785a"/>
    <polygon points="1120,380 1108,374 1110,386" fill="#a0785a"/>
    <polygon points="1080,460 1068,454 1070,466" fill="#a0785a"/>
  </g>
  <!-- Currency symbols abstractly -->
  <g font-family="system-ui, -apple-system, sans-serif" opacity="0.1" font-size="24">
    <text x="160" cy="280" fill="#a0785a">KES</text>
    <text x="180" y="400" fill="#a0785a">$</text>
    <text x="1000" y="300" fill="#a0785a">M</text>
    <text x="980" y="420" fill="#a0785a">KES</text>
  </g>
  <!-- Connection nodes -->
  <circle cx="200" cy="300" r="8" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="180" cy="380" r="8" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="220" cy="460" r="8" fill="none" stroke="#c4a080" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="1000" cy="300" r="8" fill="none" stroke="#a0785a" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="1020" cy="380" r="8" fill="none" stroke="#a0785a" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="980" cy="460" r="8" fill="none" stroke="#a0785a" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Ambient elements -->
  <circle cx="150" cy="150" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1050" cy="180" r="4" fill="#a0a0a5" opacity="0.15"/>
  <circle cx="300" cy="620" r="3" fill="#a0a0a5" opacity="0.2"/>
  <circle cx="900" cy="640" r="4" fill="#c4a080" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">SAFARICOM FINTECH TRANSFORMATION</text>
</svg>