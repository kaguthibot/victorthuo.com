<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgP2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e2"/>
      <stop offset="40%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgP2)"/>
  <!-- Landscape composition - abstract mountains/horizon -->
  <!-- Sky -->
  <!-- Mountain range - far -->
  <path d="M0,450 L150,320 L300,380 L450,280 L550,340 L700,250 L850,310 L950,260 L1050,330 L1200,290 L1200,500 L0,500 Z" fill="#e0e0e2" opacity="0.4"/>
  <!-- Mountain range - mid -->
  <path d="M0,500 L100,420 L250,460 L400,380 L500,430 L650,360 L800,400 L900,350 L1050,410 L1200,370 L1200,550 L0,550 Z" fill="#c8c8cb" opacity="0.25"/>
  <!-- Foreground -->
  <path d="M0,550 L200,520 L400,540 L600,510 L800,530 L1000,515 L1200,540 L1200,650 L0,650 Z" fill="#c4a080" opacity="0.08"/>
  <!-- Sun/moon circle -->
  <circle cx="800" cy="220" r="50" fill="#c4a080" opacity="0.08" stroke="#c4a080" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Horizon line -->
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#c8c8cb" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Rule of thirds grid -->
  <g opacity="0.04">
    <line x1="400" y1="0" x2="400" y2="800" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="800" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="0" y1="267" x2="1200" y2="267" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="0" y1="533" x2="1200" y2="533" stroke="#a0a0a5" stroke-width="1"/>
  </g>
  <!-- Viewfinder corners -->
  <g stroke="#a0785a" stroke-width="1.5" stroke-opacity="0.15">
    <line x1="150" y1="150" x2="150" y2="190" />
    <line x1="150" y1="150" x2="190" y2="150" />
    <line x1="1050" y1="150" x2="1050" y2="190" />
    <line x1="1050" y1="150" x2="1010" y2="150" />
    <line x1="150" y1="650" x2="150" y2="610" />
    <line x1="150" y1="650" x2="190" y2="650" />
    <line x1="1050" y1="650" x2="1050" y2="610" />
    <line x1="1050" y1="650" x2="1010" y2="650" />
  </g>
  <!-- Abstract tree silhouettes -->
  <g opacity="0.1">
    <line x1="300" y1="550" x2="300" y2="470" stroke="#7d5c42" stroke-width="2"/>
    <circle cx="300" cy="460" r="20" fill="#7d5c42" opacity="0.3"/>
    <line x1="500" y1="550" x2="500" y2="490" stroke="#7d5c42" stroke-width="1.5"/>
    <circle cx="500" cy="482" r="15" fill="#7d5c42" opacity="0.3"/>
  </g>
  <!-- Ambient particles -->
  <circle cx="200" cy="200" r="2" fill="#c4a080" opacity="0.2"/>
  <circle cx="600" cy="180" r="3" fill="#a0a0a5" opacity="0.15"/>
  <circle cx="1000" cy="600" r="2" fill="#c4a080" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">PHOTOGRAPHY</text>
</svg>