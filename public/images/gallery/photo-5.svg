<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgP5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e0e0e2"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgP5)"/>
  <!-- Golden ratio spiral (composition guide) -->
  <g opacity="0.15" fill="none" stroke="#c4a080" stroke-width="1.5">
    <!-- Fibonacci rectangles and spiral -->
    <rect x="200" y="150" width="800" height="500" rx="0"/>
    <line x1="694" y1="150" x2="694" y2="650" stroke-opacity="0.5"/>
    <line x1="694" y1="345" x2="200" y2="345" stroke-opacity="0.5"/>
    <!-- Spiral arcs -->
    <path d="M694,650 A306,306 0 0,1 1000,345" stroke="#a0785a" stroke-width="1.5"/>
    <path d="M1000,345 A194,194 0 0,1 694,150" stroke="#a0785a" stroke-width="1.5" stroke-opacity="0.8"/>
    <path d="M694,150 A120,120 0 0,1 200,345" stroke="#a0785a" stroke-width="1.2" stroke-opacity="0.6"/>
    <path d="M200,345 A75,75 0 0,1 500,650" stroke="#a0785a" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <!-- Abstract light and shadow blocks -->
  <rect x="200" y="150" width="494" height="195" fill="#c4a080" opacity="0.03"/>
  <rect x="694" y="345" width="306" height="305" fill="#c4a080" opacity="0.04"/>
  <rect x="200" y="345" width="494" height="305" fill="#c8c8cb" opacity="0.03"/>
  <rect x="694" y="150" width="306" height="195" fill="#c8c8cb" opacity="0.04"/>
  <!-- Abstract composition elements at golden points -->
  <circle cx="694" cy="345" r="12" fill="#a0785a" opacity="0.12"/>
  <circle cx="694" cy="345" r="6" fill="#a0785a" opacity="0.2"/>
  <!-- Intersection points -->
  <g opacity="0.1">
    <line x1="688" y1="345" x2="700" y2="345" stroke="#a0785a" stroke-width="1.5"/>
    <line x1="694" y1="339" x2="694" y2="351" stroke="#a0785a" stroke-width="1.5"/>
  </g>
  <!-- Scattered photo-like rectangles -->
  <g opacity="0.08">
    <rect x="100" y="200" width="60" height="40" rx="2" fill="#c4a080" transform="rotate(-8, 130, 220)"/>
    <rect x="1040" y="180" width="55" height="38" rx="2" fill="#c8c8cb" transform="rotate(5, 1065, 200)"/>
    <rect x="120" y="600" width="50" height="35" rx="2" fill="#c8c8cb" transform="rotate(12, 145, 618)"/>
    <rect x="1030" y="580" width="58" height="40" rx="2" fill="#c4a080" transform="rotate(-6, 1060, 600)"/>
  </g>
  <!-- Grid overlay suggestion -->
  <g opacity="0.03">
    <line x1="200" y1="317" x2="1000" y2="317" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="200" y1="483" x2="1000" y2="483" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="467" y1="150" x2="467" y2="650" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="733" y1="150" x2="733" y2="650" stroke="#a0a0a5" stroke-width="1"/>
  </g>
  <!-- Ambient elements -->
  <circle cx="150" cy="100" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1050" cy="120" r="4" fill="#a0a0a5" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">PHOTOGRAPHY</text>
</svg>