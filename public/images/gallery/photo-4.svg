<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgP4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a080" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a0785a" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgP4)"/>
  <!-- Camera body outline -->
  <g transform="translate(350, 200)" opacity="0.22">
    <!-- Body -->
    <rect x="0" y="80" width="500" height="300" rx="20" fill="none" stroke="#a0785a" stroke-width="2"/>
    <!-- Viewfinder hump -->
    <rect x="150" y="20" width="200" height="80" rx="10" fill="none" stroke="#a0785a" stroke-width="2"/>
    <rect x="150" y="60" width="200" height="40" rx="0" fill="none" stroke="none"/>
    <!-- Connect hump to body -->
    <line x1="150" y1="80" x2="150" y2="100" stroke="#a0785a" stroke-width="2"/>
    <line x1="350" y1="80" x2="350" y2="100" stroke="#a0785a" stroke-width="2"/>
    <!-- Lens mount -->
    <circle cx="250" cy="240" r="100" fill="none" stroke="#c4a080" stroke-width="2"/>
    <circle cx="250" cy="240" r="80" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <circle cx="250" cy="240" r="60" fill="url(#filmGrad)" stroke="#c8c8cb" stroke-width="0.8"/>
    <circle cx="250" cy="240" r="25" fill="none" stroke="#a0785a" stroke-width="1"/>
    <!-- Shutter button -->
    <circle cx="380" cy="60" r="15" fill="none" stroke="#a0785a" stroke-width="1.5"/>
    <!-- Mode dial -->
    <circle cx="420" cy="100" r="20" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="420" y1="82" x2="420" y2="90" stroke="#c8c8cb" stroke-width="1"/>
    <!-- Hot shoe -->
    <rect x="210" y="22" width="80" height="8" rx="2" fill="none" stroke="#c8c8cb" stroke-width="1"/>
    <!-- Grip lines -->
    <line x1="20" y1="120" x2="20" y2="360" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="35" y1="120" x2="35" y2="360" stroke="#c8c8cb" stroke-width="1"/>
    <line x1="50" y1="120" x2="50" y2="360" stroke="#c8c8cb" stroke-width="1"/>
  </g>
  <!-- Light rays emanating from lens -->
  <g opacity="0.06">
    <line x1="600" y1="440" x2="100" y2="300" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="80" y2="400" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="100" y2="500" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="120" y2="600" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="1100" y2="300" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="1120" y2="400" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="1100" y2="500" stroke="#c4a080" stroke-width="1"/>
    <line x1="600" y1="440" x2="1080" y2="600" stroke="#c4a080" stroke-width="1"/>
  </g>
  <!-- Film negative strip at bottom -->
  <g opacity="0.1">
    <rect x="100" y="620" width="1000" height="70" rx="4" fill="none" stroke="#a0a0a5" stroke-width="1"/>
    <!-- Frames -->
    <rect x="120" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <rect x="240" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <rect x="360" y="630" width="100" height="50" rx="2" fill="#c4a080" opacity="0.3"/>
    <rect x="480" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <rect x="600" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <rect x="720" y="630" width="100" height="50" rx="2" fill="#c4a080" opacity="0.3"/>
    <rect x="840" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <rect x="960" y="630" width="100" height="50" rx="2" fill="#e0e0e2"/>
    <!-- Sprocket holes -->
    <circle cx="115" cy="625" r="4" fill="#a0a0a5"/>
    <circle cx="115" cy="685" r="4" fill="#a0a0a5"/>
    <circle cx="1095" cy="625" r="4" fill="#a0a0a5"/>
    <circle cx="1095" cy="685" r="4" fill="#a0a0a5"/>
  </g>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">PHOTOGRAPHY</text>
</svg>