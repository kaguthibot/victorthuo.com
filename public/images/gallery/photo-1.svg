<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgP1" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e0e0e2"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgP1)"/>
  <!-- Camera lens / aperture blades -->
  <circle cx="600" cy="380" r="200" fill="none" stroke="#c8c8cb" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="600" cy="380" r="180" fill="none" stroke="#e0e0e2" stroke-width="1"/>
  <!-- Aperture blades -->
  <g opacity="0.2">
    <line x1="600" y1="200" x2="520" y2="310" stroke="#a0785a" stroke-width="2"/>
    <line x1="520" y1="310" x2="520" y2="450" stroke="#a0785a" stroke-width="2"/>
    <line x1="520" y1="450" x2="600" y2="560" stroke="#a0785a" stroke-width="2"/>
    <line x1="600" y1="560" x2="680" y2="450" stroke="#a0785a" stroke-width="2"/>
    <line x1="680" y1="450" x2="680" y2="310" stroke="#a0785a" stroke-width="2"/>
    <line x1="680" y1="310" x2="600" y2="200" stroke="#a0785a" stroke-width="2"/>
  </g>
  <!-- Inner aperture -->
  <polygon points="600,240 545,320 545,440 600,520 655,440 655,320" fill="#c4a080" opacity="0.05" stroke="#c4a080" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Outer ring details -->
  <circle cx="600" cy="380" r="220" fill="none" stroke="#c8c8cb" stroke-width="0.8" stroke-dasharray="2 8" stroke-opacity="0.3"/>
  <circle cx="600" cy="380" r="240" fill="none" stroke="#e0e0e2" stroke-width="0.5" stroke-opacity="0.25"/>
  <!-- Focus ring marks -->
  <g opacity="0.12">
    <line x1="600" y1="135" x2="600" y2="150" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="720" y1="160" x2="712" y2="174" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="810" y1="240" x2="798" y2="250" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="845" y1="380" x2="830" y2="380" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="810" y1="520" x2="798" y2="510" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="720" y1="600" x2="712" y2="586" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="600" y1="625" x2="600" y2="610" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="480" y1="600" x2="488" y2="586" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="390" y1="520" x2="402" y2="510" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="355" y1="380" x2="370" y2="380" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="390" y1="240" x2="402" y2="250" stroke="#a0a0a5" stroke-width="1"/>
    <line x1="480" y1="160" x2="488" y2="174" stroke="#a0a0a5" stroke-width="1"/>
  </g>
  <!-- Center focal point -->
  <circle cx="600" cy="380" r="6" fill="#a0785a" opacity="0.2"/>
  <circle cx="600" cy="380" r="2" fill="#a0785a" opacity="0.4"/>
  <!-- Ambient elements -->
  <circle cx="150" cy="150" r="3" fill="#c4a080" opacity="0.2"/>
  <circle cx="1050" cy="180" r="4" fill="#a0a0a5" opacity="0.15"/>
  <circle cx="200" cy="650" r="3" fill="#a0a0a5" opacity="0.2"/>
  <circle cx="1000" cy="620" r="4" fill="#c4a080" opacity="0.15"/>
  <!-- Title -->
  <text x="600" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a5" letter-spacing="4" opacity="0.6">PHOTOGRAPHY</text>
</svg>